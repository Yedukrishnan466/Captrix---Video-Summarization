<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f3f4f6;
            padding: 20px;
        }

        .signin-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow:
                0 10px 30px rgba(0, 0, 0, 0.08),
                0 30px 60px rgba(0, 0, 0, 0.05);
        }

        .signin-title {
            text-align: center;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111827;
        }

        .signin-subtitle {
            text-align: center;
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #374151;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 14px 14px 42px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-wrapper input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
        }

        .input-icon {
            position: absolute;
            top: 50%;
            left: 14px;
            transform: translateY(-50%);
            font-size: 16px;
            color: #9ca3af;
        }

        .password-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .forgot-link {
            font-size: 13px;
            text-decoration: none;
            color: #7c3aed;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .signin-button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            background: linear-gradient(
                90deg,
                #8b5cf6,
                #6366f1,
                #2563eb
            );
            transition: all 0.3s ease;
            box-shadow:
                0 8px 20px rgba(99, 102, 241, 0.25);
        }

        .signin-button:hover {
            transform: translateY(-2px);
            box-shadow:
                0 12px 30px rgba(99, 102, 241, 0.35);
        }

        .signup-text {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .signup-text a {
            color: #7c3aed;
            font-weight: 600;
            text-decoration: none;
        }

        .signup-text a:hover {
            text-decoration: underline;
        }

        /* Responsive */

        @media (max-width: 480px) {
            .signin-container {
                padding: 30px 20px;
            }

            .signin-title {
                font-size: 24px;
            }
        }

    </style>
</head>
<body>

    <div class="signin-container">

        <div class="signin-title">Welcome Back</div>
        <div class="signin-subtitle">Sign in to your account</div>
        {% if messages %}
        {% for message in messages %}
            <div style="color:red; margin-bottom:15px; font-size:14px;">
                {{ message }}
            </div>
        {% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                <div class="input-wrapper">
                    <span class="input-icon">✉</span>
                    <input type="email" name="email" placeholder="you@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <div class="password-row">
                    <label>Password</label>
                    
                </div>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" name="password" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="signin-button">Sign In</button>

        </form>

        <div class="signup-text">
            Don't have an account?
            <a href="{% url 'signup' %}">Sign up</a>
        </div>

    </div>

</body>
</html>
